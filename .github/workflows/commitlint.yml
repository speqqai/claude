name: Lint Commit Messages

on:
  pull_request:
    branches:
      - main

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          PATTERN='^(feat|fix|docs|chore|refactor|test|ci|style|perf)(\(.+\))?: .+'
          FAILED=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "INVALID: $msg"
              echo "  Must match: <type>(<scope>): <description>"
              echo "  Types: feat, fix, docs, chore, refactor, test, ci, style, perf"
              FAILED=1
            fi
          done < <(git log --format='%s' origin/main..HEAD)

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "One or more commit messages do not follow Conventional Commits."
            echo "See: https://www.conventionalcommits.org"
            exit 1
          fi

          echo "All commit messages are valid."
